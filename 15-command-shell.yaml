- name: ansible command shell example
  hosts: local
  connection: local
  tasks:
    - name: Run a command on the local machine
      ansible.builtin.command: echo "Hello, Ansible!"
      register: command_output

    - name: Display the command output
      ansible.builtin.debug:
        msg: "{{ command_output }}"  

    - name: Run a shell command on the local machine
      ansible.builtin.shell: echo "Hello, Ansible!" >> output.txt
      register: shell_output

    - name: Display the shell command output
      ansible.builtin.debug:
        msg: "{{ shell_output }}"  

    - name: Run a shell command on the local machine
      ansible.builtin.shell: ps -ef | grep ansible
      register: ps_output

    - name: Display the ps command output
      ansible.builtin.debug:
        msg: "{{ ps_output }}"  