- name: installing packages example
  hosts: local
  connection: local
  become: true
  tasks:
    - name: Install packages using a loop
      ansible.builtin.yum:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
        - { name: 'nginx' , state: 'present' }
        - { name: 'mysql' , state: 'absent' }
        - { name: 'python3-pip' , state: 'absent' }
        - { name: 'htop' , state: 'present' }