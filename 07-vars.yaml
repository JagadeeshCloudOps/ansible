- name: print username and password
  hosts: local
  connection: local
  vars_prmpt:
   - name: "username"
     prompt: "Enter your username"
     private: false
   - name: "password"
     prompt: "Enter your password"
     private: true  
  tasks:
    - name: print the username and password
      ansible.builtin.debug:
        msg: "the username is {{ username }} and the password is {{ password }}"   